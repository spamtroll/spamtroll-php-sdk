name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test / PHP ${{ matrix.php }} / ${{ matrix.dependencies }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.0', '8.1', '8.2', '8.3', '8.4']
        dependencies: [lowest, highest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: curl, json, mbstring
          coverage: none
          tools: composer:v2

      # Older PHP runners cannot install Pest (paratest needs 8.2+) — fall
      # back to PHPUnit for the matrix legs that don't satisfy dev tooling.
      - name: Install dependencies (PHP < 8.2 — PHPUnit only)
        if: ${{ matrix.php == '8.0' || matrix.php == '8.1' }}
        run: composer require --dev --no-update phpunit/phpunit:^10.5
          && composer remove --dev --no-update pestphp/pest pestphp/pest-plugin-arch peckphp/peck
          && composer update --prefer-${{ matrix.dependencies == 'lowest' && 'lowest' || 'stable' }} --prefer-dist --no-progress --no-interaction --ignore-platform-req=php

      - name: Install dependencies (PHP >= 8.2)
        if: ${{ matrix.php != '8.0' && matrix.php != '8.1' }}
        uses: ramsey/composer-install@v3
        with:
          dependency-versions: ${{ matrix.dependencies }}

      - name: Run tests (Pest where available, PHPUnit otherwise)
        run: |
          if [ -f vendor/bin/pest ]; then
            vendor/bin/pest --colors=always
          else
            vendor/bin/phpunit --colors=always
          fi

  qa:
    name: Quality (PHPStan + cs-fixer + peck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: curl, json, mbstring
          coverage: none
          tools: composer:v2

      - name: Install aspell (for peck)
        run: sudo apt-get update && sudo apt-get install -y aspell aspell-en

      - name: Install dependencies
        uses: ramsey/composer-install@v3

      - name: PHP-CS-Fixer (dry-run)
        run: composer lint

      - name: PHPStan
        run: composer stan

      - name: Peck (spell check)
        run: composer peck
